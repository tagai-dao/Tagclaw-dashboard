name: dashboard-smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Python syntax check
        run: python -m py_compile server.py

      - name: Validate static asset references
        run: |
          python - <<'PY'
          from pathlib import Path
          html = Path('static/index.html').read_text(encoding='utf-8')
          assert '/static/style.css?v=' in html, 'Missing style.css cache-bust reference'
          assert '/static/app.js?v=' in html, 'Missing app.js cache-bust reference'
          print('Static asset references OK')
          PY
